body:
  text: 極元集總集類提要臣等謹案極元集二卷唐姚合編合有詩集已著録合為詩刻意苦吟工于㸃綴小景搜求新意而刻畫太甚流于纎仄者亦復不少宋末江湖詩派皆從是導源者也然選録是集乃特有鑒裁所取王維至戴叔倫二十一人之詩几一百首今存者凡九十九合自稱為詩家射雕手亦非虛語計敏夫唐詩紀事凡載集中所録之詩皆注曰右姚合取為極元集蓋宋人甚重其書矣二十一人之中惟僧靈一法振皎然清江四人不著始未祖詠不著其字暢當字下作二方空蓋原本有而傳寫佚闕其餘則字及爵里與登科之士一一詳載觀劉長卿名下注曰宣城人與唐書稱河間人者不同乂皇甫曽注天寶十二載進士皇甫冉注天寶十五載進士以登科先後為次置曽于冉之前與諸書稱兄弟同登進士者亦不同知為合之原注非後人抄撮諸書所增入總集之兼具小傳實自此始亦足以資考證也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀極𤣥集原序唐詩數千百家浩如淵海姚合以唐人選唐詩其識鑒精矣然所選僅若此何也蓋當是時以詩鳴者人有其集製作雖多鮮克全美譬之握珠懷璧豈得悉無瑕類者哉武功去取之法嚴故其選精選之精故所取僅若此宋初詩人猶宗唐自蘇黃一出唐法幾廢介甫選唐百家亦惟據宋次道所有本耳又𤣥粹苑世已稀覩况其他乎易嘗采唐人詩幾千家萬有餘首視此有愧蓋憫作者之苦心悼後世之無聞故凡一聯一句可傳誦者悉録不遺亦不以人廢固知博而寡要勞而無功知我罪我一不敢計業欲並鋟諸梓而力有未逮姑先此集與言詩者共之時重紀至元之五年三月既望建陽蔣易題
