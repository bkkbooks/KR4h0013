  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0013_WYG_001-1a, image: WYG1332/WYG1332-0151a.png}
body:
  text: 極𤣥集巻上唐姚合選王維字摩詰河東人開元九年進士歴拾遺御史天寳末給事中肅宗時尚書右丞送鼂監歸日本積水不可極安知滄海東九州何處所萬里若乘空向國唯看日歸帆但信風鼇身映天黑魚眼射波紅鄉樹扶桑外主人孤島中别離方異域音信若為通送丘為憐君不得意況復柳條春為客黄金盡還家白髮新五湖三畝宅萬里一歸人知爾不能薦羞稱獻納臣觀獵風勁角弓鳴將軍獵渭城草枯鷹眼疾雪盡馬蹄輕忽過新豐市還歸細柳營㢠廻看射鵰處千里暮雲平祖詠開元十三年進士留别盧象朝來已握手宿别更傷心灞水行人渡商山驛路深故情君且足謫宦我難任直道皆如此誰能淚滿襟蘭峰贈張九臯集作扈從御宿池君王既廵狩輦路入秦亰逺樹低蒼壘孤山出幔城寒疎清禁漏夜警羽林兵誰念迷方客長懐魏闕情蘇氏别業國秀集作薊門别業英靈集作逰蘇氏别業别業居幽處到來生隱心南山當户牖灃水暎園林竹覆經冬雪庭昏未夕隂寥寥人境外閒坐聽春禽夕次圃田店前路入鄭郊尚經百餘里馬煩時欲歇客歸程未巳落日桑柘隂遥村煙火起西還不遑宿中夜渡涇水本集路刻程村刻林題韓少府水亭梅福幽栖處佳期不忘還鳥啼當户竹花繞傍池山水氣侵堦冷藤隂覆座閒寜知武陵趣宛在市朝間李端字正已趙郡人大厯五年進士與盧綸吉中孚韓栩錢起司空曙苗發崔洞耿湋夏侯審唱和號十才子歴校書郎終杭州司馬贈苗員外朱户敞髙扉青槐礙落暉八龍承慶重三虎遞朝歸坐竹人聲絶横琴鳥語稀花慙潘岳貎年稱老萊衣葉暗新櫻熟絲長粉蝶飛應憐魯儒賤空與故山違茂陵山行陪韋工部宿雨朝來歇空山天氣清盤雲雙鶴下隔水一蟬鳴古道黄花落平蕪赤燒生茂陵雖有病猶得伴君行雲際中峰自得中峰住深林亦閉關經秋無客到入夜有僧還暗澗泉聲小荒岡樹影閒髙亭不可望星月滿空山本集岡作村亭作窗蕪城懐古風吹城上樹草沒城邉路城裏月眀時精靈自來去耿湋或作緯寳應二年進士官至左拾遺湋音為贈嚴維許詢清論重寂寞住山隂野客投寒寺閒門當古林海田秋熟早湖水夜漁深世上窮通理誰能奈此心贈朗公來自西天竺持經奉紫微年深梵語變行苦俗人歸月上安禪乆苔生出院稀梁間有馴鴿不去為無機早朝鐘鼔餘聲裏千官向紫微冒寒人語少乘月燭來稀清漏聞馳道紅霞暎瑣闈猶看嘶馬處未啟掖垣扉紅一作輕秋日返照入閭巷憂來誰與語古道無人行秋風動禾黍書情逢故人原題巴陵逢洛陽隣舍因君知此事流浪已忘機客久多人識年髙衆病歸連雲湖色逺度雪雁聲稀又說家林盡淒傷淚滿衣沙上雁衡陽多道里弱羽復哀音還塞知何日驚弦亂此心夜隂前侣逺秋冷後湖深獨立汀沙意寜知雪霰侵本集雪作霜贈張將軍寥落軍城暮重門返照間鼓鼙經雨暗士馬過秋閒慣守臨邊郡曾營近海山關西舊業在夜夜夢中還酬暢當同逰漆沮後已是十年餘幾度曾相夢何時定得書月髙城影盡霜重柳條疎且對尊中酒千般想未如盧綸字允言河東人天寳末舉進士不第大厯初王縉奏為集賢學士終户部郎中領嶺南故人書本集作夜中得循州趙司馬侍郎書因寄囘使瘴海寄雙魚中宵逹我居兩行燈下淚一紙嶺南書地說炎蒸極人稱老病餘殷勤報賈誼莫共酒盃疎題興善寺後池隔窗栖白鳥似與鏡湖隣月照何年樹花逢幾世人㟁莎青有路苔徑緑無塵願得容依止僧中老此身本集願得作永願山下古木髙林已蕭索夜雨復秋風墜葉鳴荒竹斜根擁斷蓬半侵山影裏長在水聲中此地何人到雲門路亦通送李端故關衰草徧離别自堪悲路出寒雲外人歸暮雪時少孤為客早多難識君遲掩淚空相向風塵何所期司空曙字文明廣平人舉進士貞元中水部郎中終虞部郎中耿湋就宿因傷故人舊時聞笛淚此夜重霑衣方恨同懐少􅄼堪相見稀竹煙凝澗壑林雪似芳菲多謝勞車馬應憐獨掩扉􅄼一作何經廢寶慶寺黄葉前朝寺無僧寒殿開池晴龜出曝松暝鶴飛囘古砌碑横草隂廊畵雜苔禪宮亦消歇塵世轉堪哀春日野望寄錢員外草長花落樹羸病强尋春無復少年意空餘白髮新青原髙見水白社靜逢人寄語南宮客軒車不可親本集白社作華社喜外弟盧綸見宿靜夜無四隣荒居舊業貧雨中黄葉樹燈下白頭人以我獨沈久愧君相見頻平生自有分况是蔡家親蔡或刻霍送王閏相送臨寒水蒼茫望故關江蕪連夢澤楚雪入商山話我他年舊看君此日還因將自悲淚一洒别離顔顔集作間新蟬今朝蟬忽鳴遷客若為情漸覺一年謝能令萬感生微風初滿樹落日稍沉城為問同懐者淒􅈵聽幾聲本集漸作便謝作老望水髙樓晴見水楚色靄相和野極空如練天遥不辨波永無人跡到時有鳥行過况是蒼茫外殘陽照最多哭麴象憶昔秋風起君曾歎逐臣何言芳草日自作九原人錢起字仲文吴興人天寳十載進士歴校書郎終尚書郎太清宮使送僧歸日本上國隨縁住東途若夢行浮雲滄海逺去世法舟輕水月通禪觀魚龍聽梵聲唯憐惠燈影萬里眼中明送僧自吳逰蜀隨縁忽西去何日返東林世路無期别空門不住心人煙一飯少山雪獨行深天外猿聲夜誰聞清梵音本集無期作寜嗟不住作久息夜作處送張管書記邊事多勞役儒衣逐鼔鼙日寒關樹外峰盡塞雲西河廣篷難度天遥雁漸低班超封定逺之子去思齊送征雁秋空萬里靜嘹唳獨南征風急翻霜冷雲開見月驚塞長憐去翼影滅有餘聲悵望遥天外鄉愁滿目生寄郎士元龍節知無事江城不掩扉詩傳過客逺書到故人稀坐嘯看潮起行春送雁歸望舒三五夜思盡謝𤣥暉宿洞口觀或作耿湋詩野竹通溪冷秋蟬入戸鳴亂來人不到寒草上階生本集蟬作泉寒作芳裴廸書齋望月中興集作裴廸書齋翫月小異夜來詩酒興獨上謝公樓影閉重門靜寒生獨樹秋鵲驚隨葉散螢逺入煙流今夕遥天末清輝幾處愁本集獨上作月滿送彈琴李長史赴洪州中興集小異抱琴為傲吏孤棹復南征幾度秋江水皆添白雪聲佳期來客夢幽思緩王程佐牧無勞問心和政自平郎士元字君胄天寳十五年進士與錢起齊名厯拾遺終郢州刺史送彭將軍集作送李將軍赴定州雙旌漢飛將萬里授横戈春色臨關盡黄雲出塞多鼔鼙悲絶漠烽戍隔長河莫斷隂山路天驕已請和本集關作邊戍作火第七句作想到山隂北送孫頠悠然富春客憶與暮潮歸擢第人多羡如君獨歩稀亂流江渡淺逺色海山微若訪新安路嚴陵有釣磯贈張南史雨餘深巷靜獨酌送殘春車馬雖嫌僻鶯花不棄貧蟲聲黏户網䑕迹印牀塵聞道山陽㑹如今有幾人本集聞道作借問宿杜判官江樓適楚豈吾願思歸秋向深故人江樓月永夜千里心落葉覺鄉夢鳥啼驚越吟寥寥更何有斷續空城砧送楊中丞和畨中興集同錦車登隴日邊草正萋萋舊好尋君長新愁聽鼓聲河源飛鳥外雪嶺大荒西漢壘今猶在遥知路不迷送長沙韋明府之任秋入長沙縣蕭條旅宦心煙波連桂水官舍暎楓林雲日楚天暮汀沙白露深遥知訟堂裡嘉政在鳴琴送奚賈歸吳中興集小異東南富春渚曾是謝公逰今日奚生去新安江正秋水容清過客楓葉落行舟遥想青亭下聞猿應夜愁本集水容清作水清迎楓作霜落作伴青作赤送友人别集作盩厔縣鄭礒宅送錢大中興集作别鄭礒小異暮蟬不可聽落葉豈堪聞共是悲秋客􅄼知此路分荒城背流水逺雁入寒雲陶令門前菊餘花可贈君暢當字闕太河東人進士及第貞元初常博士終果州刺史宿潭上夜潭有仙舸與月當水中嘉賓愛明月逰子驚秋風又青蒲野陂水白露明月天中夜秋風起心事坐澘然别盧綸故交君獨在又欲與君離我有新秋淚非闗宋玉悲極𤣥集巻上
