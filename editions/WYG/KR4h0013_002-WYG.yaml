  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0013_WYG_002-1a, image: WYG1332/WYG1332-0156c.png}
body:
  text: 極𤣥集巻下唐姚合選韓翃字君平南陽人天寶十三載進士以寒食詩受知德宗官至中書舍人少年行千㸃斕斒噴玉驄青絲結尾繡纒鬃鳴鞭曉出銅臺路葉葉春衣楊柳風本集噴玉作玉勒曉作晩銅作章羽林騎驄馬牽來御柳中鳴鞭欲向渭橋東紅蹄亂踏春城雪花頷驕嘶上苑風本集驄作駿題薦福衡岳禪師房中興集小異春城乞食還髙論此中閒僧臘堦前樹禪心江上山疎簾看雪巻深户暎花關晩送門人去鐘聲杳靄間本集樹作草去作出送孫革及第歸本集作送李秀才歸江南中興集小異過淮芳草歇千里又東歸野水吳山出家林越鳥飛荷香隨去棹梅雨㸃行衣無數滄洲客如君達者稀本集林作村洲作江皇甫曽字孝常丹陽人天寳十二載進士歴官監察御史與兄冉齊名一時尋劉處士幾年人不見林下掩柴關留客當清夜逢君話舊山隔城寒杵急帶月早鴻還南陌雖相近其如隱者閒哭陸處士從此無期見柴扉帶雪開二毛逢世難萬恨掩泉臺返照空堂夕孤城弔客㢠廻漢家偏訪道獨畏鶴書來本集扉帶作門對送人作使歸本集作送李中丞歸本道中興集作送杜中丞還京上將還專席雙旌復出秦關河三晉路賔從五原人孤戍雲連海平沙雪度春酬恩看玉劔何處有煙塵本集還專席作宜分閫出作去後聯作碣石山通海滹沲雪度春李嘉祐字從一袁州人天寳七載進士大厯中泉州刺史和苗員外秋夜省直中興集同乆雨南宮夜仙郎寓直時漏長丹鳳闕秋老白雲司螢影侵階亂鴻聲出苑遲蕭條人吏散小謝有新詩本集乆作多寓作上老作令皇甫冉宇茂政丹陽人天寳十五載進士大厯中為左補闕送韓司直此詩今但見皇甫曾集又見郎士元集又見劉長卿集遊吳還適越來徃任風波復送王孫去其如春草何山明殘雪在湖滿夕陽多季子留遺廟停舟試一過本集山作岸湖作潮宿嚴維宅本集上多秋夜二字昔聞𤣥度宅門向㑹稽峰君住東湖下清風繼舊蹤初秋臨水月半夜隔山鐘世路多離别良宵詎可逢本集路作故途中送權曙二兄淮海風濤起江關憂思長同悲鵲繞樹獨作雁隨陽山晩雲和雪汀寒月照霜由來濯纓處漁父愛滄浪西陵寄一公此詩又見皇甫曽集西陵遇風處自古是通津終日空江上雲山若待人汀沙寒事早魚鳥興同新南望山隂路吾心有所親本集沙作洲同作情吾心作心中九日寄鄭愕本集愕作豐重陽秋已晩千里信仍稀何處登髙望知君正憶歸還當采時菊應未授寒衣欲識離居恨郊園晝掩扉本集晝作正酬崔侍郎期蘇道士不至本集中興集郎作御一心求妙道幾嵗候真師丹竈今何處白雲無定期崐崘煙景絶汗漫往來遲君但焚香待人間到有時本集處作在煙景作景致來作還巫山髙本集髙作峽御覽集中興集同巫峽見巴東迢迢出半空雲藏神女館雨到楚王宮朝暮泉聲落寒暄樹色同清猿不可聽偏在九秋中送元晟歸潜山中興集作送元晟還歸潛山所居深山秋事早歸去復何如裛露收新稼迎寒葺舊廬題詩即招隱作賦是閒居别後空相憶􅄞康懶寄書朱放字長通襄州人隱居剡溪貞元初召拜拾遺不就送張山人歸知君住處足風煙古樹荒村在眼前便欲移家逐君去唯愁未有買山錢送著公歸越誰能愁此别到越㑹相逢長憶雲門寺門前千萬峰石牀埋積雪山路倒枯松莫學白道士無人知去蹤嚴維字正文山隂人至徳一載進士厯諸暨及河南尉終校書郎送薛尚書入朝卑情不敢論拜手立轅門列郡諸侯長登朝八座尊凝笳臨水發行斾向風翻幾許遺民泣同懐父母恩本集民作黎一本敢作可題一公院新泉山下新泉出泠泠比法源落池才有響濺石未成痕獨暎孤松色殊分衆鳥喧唯當清夜月觀此啟禪門本集濺作噴哭靈一上人一公何不住空有逺公名共說岑山路今時莫可行舊房松更老新塔草初生經論傳緇侶文章徧墨卿本集下更有四句云禪林枝􅆬折法宇棟梁傾誰復修僧史應知傳已成自雲陽歸晩泊陸灃宅雪天行易晩前路故人居孤棹所思乆寒林相見初閒燈忘夜永清漏任更餘明後還須去離家嵗欲除本集雪天作天隂寒林作冒寒餘作疎嵗欲作幾嵗劉長卿字文房宣城人開元二十一年進士歴監察御史終隨州刺史過張眀府别業寥寥東郭外白首一先生考滿孤琴在家移五柳成夕陽臨水釣春雨向田畊終日空林下何人識此情本集考滿作解印家移作移家餘干旅舍揺落暮天逈青楓霜葉稀孤城向水閉獨鳥背人飛渡口月初上鄰家漁未歸鄉心正欲絶何處搗寒衣送鄭十二歸廬山潯陽數畆宅歸臥掩柴關谷口何人在門前秋草閒忘機賣藥罷不語杖藜還舊筍成寒竹空齋向暮山水流過舍下雲去到人間桂樹花應發因行寄一攀忘一本作無長沙桓王墓下書事别張南史長沙千載後春草獨萋萋流水朝還暮行人東復西苔碑幾字滅山木萬株齊唯有年芳在相看惜解攜唯有年芳在一本作佇立傷今古登思禪寺上方西峰上方處臺殿隱朦朧晩磬秋山裏清猿古木中衆溪連竹徑諸嶺共松風倘許栖林下甘成白首翁本集西峰上方處作上方幽且暮過隱公故房自從飛錫去人到沃州稀林下期何在山中春獨歸踏花尋舊徑暎竹掩空扉寥落東峰上猶堪靜者依送李中丞歸漢陽中興集作送李中丞之襄州小異流落征南將曾驅十萬師罷歸無别業老去戀明時獨立三邊靜輕生一劒隨茫茫漢江上日暮欲何之本集􅁁靜作朝識隨作知欲作復靈一酬皇甫冉西陵見寄西陵潮信滿島嶼没中流越客依風水相思南渡頭寒光生極浦落日暎滄洲何事揚帆去空驚海上鷗溪行即事近夜山更碧入林溪轉清不知伏牛地潭洞何從横野㟁煙初合平湖月未生孤舟屢失道但聽秋泉聲重還宜豐寺再過招隱寺重㑹息心期樵客問歸日山僧記别時野雲隂逺甸秋雨漲前陂勿謂頻來此吾今不好竒栖霞山夜坐山頭戒壇路幽暎雲巗側四面青石牀一峰苔蘚色松風靜復起月影開還黑何獨乗夜來殊非晝所得法振送人遊閩越不須行借問為爾話閩中海島春寒雨江帆來去風道遊𤣥度宅身寄朗陵公此别何傷逺如今關塞通疾愈寄友或刻皎然集哀樂暗成疾臥中方月移西山有清士孤嘯不可追搗藥曙林靜汲泉隂澗遲微蹤與麋鹿逺謝求羊知皎然微雨片雨拂簷楹煩襟四座清霏㣲過麥隴蕭散傍莎城靜愛和花落幽聞入竹聲朝觀趣無限髙詠寄閒情題廢寺武原罹亂後真界積塵埃殘月照秋水悲風起古臺居人今已盡栖鴿暝還來不到無生理應堪賦七哀賦得啼猿送客萬里巴山外三聲月峽深何年有此路幾客共霑巾斷壁分重影流泉入苦吟淒􅈵離别後聞此更傷心思歸示故人桐江秋信早憶在故山時靜夜風鳴磬無人竹掃墀猿來觸淨水鳥下啄寒枝何必關吾事歸心自有期清江長安臥疾身世足堪悲空房臥疾時巻簾花雨滴掃石竹隂移已覺生如夢堪嗟夀不知未能通法性詎可見支離宿嚴維宅簡章八元佳期曾不逺甲第即南隣惠愛偏相及經過豈厭頻秋光林葉動夕霽月華新莫話羈栖事平原是主人戴叔倫字幼公潤州金壇人師蕭頴士為門人冠大厯間撫州刺史容管經畧使吳眀府自逺而來留宿出門逢故友衣服滿塵埃嵗月不可問山川何處來綺城容弊宅散職寄靈臺自此留君醉相歡得幾􅂞除夜宿石頭驛旅館誰相問寒燈獨可親一年將盡夜萬里未歸人寥落悲前事支離笑此身愁顔與衰鬢明日又逢春客夜與故人偶集天秋月又滿城闕夜千重還作江南㑹翻疑夢裏逢風枝驚暗鵲露草覆寒蛩羈旅長堪醉相留畏曉鐘送友人東歸萬里楊柳色出關送故人輕煙拂流水落日照行塵積夢江湖闊憶家兄弟貧徘徊灞亭上不語自傷春别友人上五首俱與中興集同擾擾倦行役相逄陳蔡間如何百年内不見一人門對酒惜餘景問程愁亂山秋風萬里道又出穆陵關贈李山人此意靜無事閉門風景遲柳條將白髮相對共垂絲廣陵送趙主簿中興集作廣陵送趙主簿自歸蜀將歸汾水上逺省錦城來已泛西江盡仍隨北雁㢠廻暮雲征馬速曉月故關開漸向庭闈近留君醉一盃極𤣥集巻下
